<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KANPAI-MAP | どこで呑んでる？</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Noto+Sans+JP:wght@400;700&display=swap');
        :root { --neon-pink: #ff00ff; --neon-blue: #00f2ff; --bg-dark: #0a0a0c; --panel-bg: rgba(20, 20, 25, 0.98); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-dark); color: #f0f0f0; font-family: 'Noto Sans JP', sans-serif; padding: 16px; display: flex; justify-content: center; min-height: 100vh; }
        .main-wrap { max-width: 440px; width: 100%; display: flex; flex-direction: column; gap: 16px; }
        header { padding: 20px 0; text-align: center; }
        .neon-title { font-family: 'Bungee', cursive; font-size: 2.2rem; color: #fff; text-shadow: 0 0 10px var(--neon-pink); }
        .sub-title { font-size: .75rem; color: #888; margin-top: 4px; letter-spacing: 2px; }
        .glass-panel { background: var(--panel-bg); border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-label { color: var(--neon-blue); font-size: .9rem; font-weight: bold; margin-bottom: 8px; display: block; }
        .input-neon { background: rgba(0, 0, 0, .8); border: 2px solid var(--neon-blue); color: #fff; border-radius: 12px; padding: .9rem; width: 100%; outline: none; font-size: 16px; }
        .btn-kanpai { background: linear-gradient(45deg, var(--neon-pink), #ff66ff); color: #fff; font-weight: bold; border: none; border-radius: 12px; padding: 1rem; width: 100%; font-size: 1.2rem; cursor: pointer; margin-top: 14px; }
        #map { height: 380px; width: 100%; border-radius: 16px; background: #111; z-index: 1; margin-top: 10px; }
        .leaflet-tile-pane { filter: invert(100%) hue-rotate(180deg) brightness(0.6) contrast(1.2); }
        .leaflet-marker-pane, .leaflet-popup-pane { filter: none !important; }
        .leaflet-popup-content-wrapper { background: #fff !important; color: #111 !important; border: 3px solid var(--neon-pink) !important; font-weight: bold; border-radius: 12px !important; }
        .leaflet-popup-tip { background: #fff !important; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
        .inner-bounce { font-size: 2.8rem; animation: bounce .6s infinite alternate; filter: drop-shadow(0 0 5px rgba(255,0,255,0.5)); }
        .rank-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(0, 242, 255, .1); }
        .rank-num { font-family: 'Bungee', cursive; font-size: 1.2rem; min-width: 32px; text-align: center; }
        .rank-bar-wrap { width: 100%; height: 6px; background: rgba(255, 255, 255, .05); border-radius: 3px; margin-top: 6px; overflow: hidden; }
        .rank-bar { height: 100%; background: linear-gradient(90deg, var(--neon-pink), var(--neon-blue)); transition: width 1s; }
        .btn-share { background: #1da1f2; color: #fff; border: none; border-radius: 12px; padding: .8rem 1.4rem; font-size: .9rem; cursor: pointer; display: flex; align-items: center; gap: 8px; margin: 10px auto; width: fit-content; font-weight: bold;}
    </style>
</head>
<body>
<div class="main-wrap">
    <header><div class="neon-title">KANPAI-MAP</div><p class="sub-title">🍻 Nationwide Toast Party 🍻</p></header>
    <div class="glass-panel">
        <label class="input-label">ドコで呑んでる？</label>
        <input type="text" id="locationInput" class="input-neon" placeholder="例：新宿、すすきの、中洲...">
        <button class="btn-kanpai" id="kanpaiBtn">😆 カンパーイ！ 🍻</button>
    </div>
    <p id="statusMsg" style="text-align:center; font-weight:bold; height:24px; margin: 10px 0;"></p>
    <div id="shareArea" style="display:none;">
        <button class="btn-share" id="shareBtn">X で乾杯🍻</button>
    </div>
    <div id="map-container" class="glass-panel" style="padding:8px; position:relative;">
        <div id="map"></div>
        <button id="resetBtn" style="position:absolute; bottom:16px; left:16px; z-index:1000; background:#fff; color:#111; border:1px solid #ddd; padding:6px 14px; border-radius:8px; font-size:11px; font-weight:bold; cursor:pointer;">🇯🇵 全域表示</button>
    </div>
    <div class="glass-panel">
        <div style="color:var(--neon-blue); font-weight:bold; margin-bottom:12px;">🏆 都道府県別ランキング</div>
        <div id="rankingList"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, updateDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    // --- ここをFirebaseコンソールの内容に書き換えてください ---
    const firebaseConfig = {
        apiKey: "AIzaSyCwexZWC3C2lYp7hdD5PWVwSRpVm1ZOIO0",
        authDomain: "kanpai-map-75855.firebaseapp.com",
        projectId: "kanpai-map-75855",
        storageBucket: "kanpai-map-75855.firebasestorage.app",
        messagingSenderId: "752717406617",
        appId: "1:752717406617:web:3a913acbab0f31d1c9b308",
        measurementId: "G-2029Y5K368"
    };
    // -------------------------------------------------------

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const appId = 'kanpai-map-v1'; 

    let map, markers = {}, currentUser = null;

    async function init() {
        await Promise.all([
            new Promise(r => { const s = document.createElement('script'); s.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'; s.onload = r; document.head.appendChild(s); }),
            new Promise(r => { const s = document.createElement('script'); s.src = 'https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js'; s.onload = r; document.head.appendChild(s); })
        ]);

        map = L.map('map', { zoomControl: false }).setView([36.0, 137.0], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        try {
            const userCred = await signInAnonymously(auth);
            currentUser = userCred.user;
            startSync();
        } catch (e) {
            console.error("Firebase設定が必要です");
        }

        document.getElementById('kanpaiBtn').onclick = handleKanpai;
        document.getElementById('resetBtn').onclick = () => map.setView([36.0, 137.0], 5);
    }

    function startSync() {
        // セッションキーなしで全データを同期（永続化のため）
        const colRef = collection(db, 'kanpai_data');

        onSnapshot(colRef, (snap) => {
            const data = [];
            snap.forEach(d => {
                const item = { id: d.id, ...d.data() };
                data.push(item);
                if (!markers[item.id]) {
                    const icon = L.divIcon({ className: '', html: '<div class="inner-bounce">🍻</div>', iconSize: [46, 46], iconAnchor: [23, 23], popupAnchor: [0, -20] });
                    markers[item.id] = L.marker([item.lat, item.lon], { icon }).addTo(map);
                }
                markers[item.id].bindPopup(`<div style="text-align:center;">${item.id}で<br><span style="color:#f0f; font-size:20px;">${item.count}</span>人が乾杯中！</div>`);
            });
            renderRanking(data);
        });
    }

    function renderRanking(data) {
        const stats = {};
        data.forEach(d => { stats[d.pref || "その他"] = (stats[d.pref || "その他"] || 0) + d.count; });
        const sorted = Object.entries(stats).sort((a, b) => b[1] - a[1]).slice(0, 10);
        const max = sorted[0]?.[1] || 1;
        document.getElementById('rankingList').innerHTML = sorted.map(([name, count], i) => `
            <div class="rank-item">
                <span class="rank-num">${i+1}</span>
                <div style="flex:1">
                    <div style="display:flex; justify-content:space-between;"><span>${name}</span><span style="color:#f0f">${count}杯</span></div>
                    <div class="rank-bar-wrap"><div class="rank-bar" style="width:${(count/max)*100}%"></div></div>
                </div>
            </div>`).join('');
    }

    async function handleKanpai() {
        const q = document.getElementById('locationInput').value.trim();
        if(!q || !currentUser) return;
        document.getElementById('statusMsg').innerText = "探索中...";
        
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&countrycodes=jp&addressdetails=1`);
            const json = await res.json();
            if(json.length > 0) {
                const { lat, lon, address } = json[0];
                const pref = address.province || address.state || address.city || "その他";
                const docRef = doc(db, 'kanpai_data', q);
                const snap = await getDoc(docRef);
                if(snap.exists()) { await updateDoc(docRef, { count: increment(1) }); }
                else { await setDoc(docRef, { lat: parseFloat(lat), lon: parseFloat(lon), pref, count: 1 }); }
                map.flyTo([lat, lon], 14);
                confetti({ particleCount: 150, spread: 70 });
                document.getElementById('statusMsg').innerText = q + "でカンパーイ！";
                document.getElementById('shareArea').style.display = 'block';
                document.getElementById('shareBtn').onclick = () => window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(q+'で乾杯！🍻 全国のみんなとつながろう！ https://fukulow.github.io/kanpai-map/ #KANPAIMAP')}`);
            } else {
                document.getElementById('statusMsg').innerText = "場所が見つかりません";
            }
        } catch (e) {
            document.getElementById('statusMsg').innerText = "エラーが発生しました";
        }
    }
    init();
</script>
</body>
</html>
